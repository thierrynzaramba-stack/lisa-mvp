<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1e1e1e;
      --text: #e8e4da;
      --muted: #555;
      --accent: #c026d3;
      --accent-dim: #c026d322;
      --user-bg: #1a1a1a;
      --ai-bg: #0f0f0f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 680px;
      padding: 2rem 1.5rem 1rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    main {
      width: 100%;
      max-width: 680px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 1.5rem;
    }

    #messages {
      flex: 1;
      padding: 2rem 0;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      min-height: 60vh;
      max-height: 65vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      animation: fadeUp 0.25s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .msg.user .msg-label { color: var(--accent); opacity: 0.6; text-align: right; }

    .msg-bubble {
      padding: 0.9rem 1.1rem;
      border: 1px solid var(--border);
      font-size: 0.88rem;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border-color: #2a2a2a;
      text-align: right;
      align-self: flex-end;
      max-width: 82%;
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border-left: 2px solid var(--accent);
      max-width: 100%;
    }

    .lisa-pay-link {
      display: inline-block;
      margin-top: 0.5rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--accent-dim);
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .lisa-pay-link:hover { opacity: 0.75; }

    .typing {
      display: flex;
      gap: 4px;
      padding: 0.9rem 1.1rem;
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      width: fit-content;
    }

    .typing span {
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 1.2rem 0 2rem;
      display: flex;
      gap: 0.8rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      padding: 0.9rem 1rem;
      resize: none;
      min-height: 52px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    textarea:disabled { opacity: 0.3; cursor: not-allowed; }

    button#send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0 1.4rem;
      height: 52px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button#send-btn:hover { opacity: 0.85; }
    button#send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    #paywall {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0a0a0aee;
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #paywall.show { display: flex; }

    .paywall-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      max-width: 420px;
      width: 100%;
      padding: 2.5rem 2rem;
      animation: fadeUp 0.3s ease forwards;
    }

    .paywall-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .paywall-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1.8rem;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .paywall-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .paywall-price {
      font-family: 'Instrument Serif', serif;
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }

    .paywall-price-note {
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 1.8rem;
    }

    .btn-pay {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 0.8rem;
    }

    .btn-pay:hover { opacity: 0.85; }

    .btn-dismiss {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      padding: 0.75rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-dismiss:hover { color: var(--text); }

    #success-banner {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      z-index: 200;
    }

    #success-banner.show { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">Lisa</div>
  <div class="tagline">Dis-moi ce que tu portes.</div>
</header>

<main>
  <div id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Écris ici…" autofocus></textarea>
    <button id="send-btn">Envoyer</button>
  </div>
</main>

<div id="paywall">
  <div class="paywall-card">
    <div class="paywall-eyebrow">Continuer avec Lisa</div>
    <div class="paywall-title">Tu mérites d'aller jusqu'au bout.</div>
    <div class="paywall-desc">
      Cette conversation peut aller plus loin.<br/>
      Débloque un accès illimité pour continuer avec Lisa.
    </div>
    <div class="paywall-price">9€</div>
    <div class="paywall-price-note">Paiement unique · Accès à vie</div>
    <button class="btn-pay" id="pay-btn">Continuer →</button>
    <button class="btn-dismiss" id="dismiss-btn">Pas maintenant</button>
  </div>
</div>

<div id="success-banner">✓ Accès débloqué</div>

<script>
  const PAID_KEY = 'lisa_paid';
  let isPaid = localStorage.getItem(PAID_KEY) === 'true';
  let history = [];

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const paywall    = document.getElementById('paywall');
  const payBtn     = document.getElementById('pay-btn');
  const dismissBtn = document.getElementById('dismiss-btn');
  const banner     = document.getElementById('success-banner');

  addMessage('ai', "Salut... T'es venu pour te vider ? Dis-moi un mot.");

  function addMessage(role, text, isHTML = false) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'Toi' : 'Lisa';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (isHTML) {
      bubble.innerHTML = text;
      const payLink = bubble.querySelector('.lisa-pay-link');
      if (payLink) {
        payLink.addEventListener('click', (e) => {
          e.preventDefault();
          showPaywall();
        });
      }
    } else {
      bubble.textContent = text;
    }
    div.appendChild(label);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-label">Lisa</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showPaywall() {
    paywall.classList.add('show');
    inputEl.disabled = true;
    sendBtn.disabled = true;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    inputEl.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, isPaid })
      });

      const data = await res.json();
      document.getElementById('typing')?.remove();

      addMessage('ai', data.reply, data.hasPayLink);
      history.push({ role: 'assistant', content: data.reply });

      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();

    } catch {
      document.getElementById('typing')?.remove();
      addMessage('ai', "J'ai un souci technique... réessaie.");
      inputEl.disabled = false;
      sendBtn.disabled = false;
    }
  }

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  payBtn.addEventListener('click', async () => {
    payBtn.textContent = 'Redirection…';
    payBtn.disabled = true;
    try {
      const res = await fetch('/api/create-checkout', { method: 'POST' });
      const { url } = await res.json();
      window.location.href = url;
    } catch {
      payBtn.textContent = 'Erreur — Réessayer';
      payBtn.disabled = false;
    }
  });

  dismissBtn.addEventListener('click', () => {
    paywall.classList.remove('show');
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get('success') === '1') {
    isPaid = true;
    localStorage.setItem(PAID_KEY, 'true');
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 4000);
    window.history.replaceState({}, '', '/');
  }
</script>
</body>
</html>
